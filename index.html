<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Why You're Amazing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Trebuchet MS', sans-serif;
    color:white;
    background:
    linear-gradient(to bottom,
    #020617 0%,
    #0f172a 35%,
    #111827 65%,
    #1e293b 100%);
    position:relative;
}

/* Moon */

.moon{
    position:absolute;
    top:60px;
    right:80px;
    width:110px;
    height:110px;
    background:#dbeafe;
    border-radius:50%;
    box-shadow:
    0 0 40px rgba(191,219,254,0.9),
    0 0 80px rgba(191,219,254,0.4);
}

/* Stars */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

/* Floating icons */

.floating{
    position:absolute;
    font-size:22px;
    opacity:0.7;
    animation:float 7s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0px);}
}

/* Main Container */

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:50px 20px 120px;
}

h1{
    font-size:3rem;
    color:#bfdbfe;
    margin-bottom:15px;
    text-shadow:0 0 20px rgba(191,219,254,0.4);
}

.subtitle{
    color:#cbd5e1;
    font-size:1.15rem;
    margin-bottom:45px;
    line-height:1.8;
}

/* Buttons */

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:18px;
    max-width:1300px;
    margin:auto;
}

.reason{
    width:240px;
    padding:18px 20px;
    border-radius:22px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    color:#dbeafe;
    cursor:pointer;
    transition:0.3s;
    font-size:1rem;
    box-shadow:0 0 15px rgba(59,130,246,0.08);
}

.reason:hover{
    transform:translateY(-6px) scale(1.03);
    background:rgba(59,130,246,0.16);
    box-shadow:0 0 25px rgba(59,130,246,0.3);
}

/* Message Box */

.message{
    margin:55px auto;
    max-width:900px;
    min-height:220px;
    padding:35px;
    border-radius:28px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    line-height:2;
    color:#eff6ff;
    font-size:1.1rem;
    text-align:left;
    box-shadow:0 0 25px rgba(59,130,246,0.12);
}

footer{
    margin-top:50px;
    color:#94a3b8;
    font-size:0.95rem;
}

/* Scrollbar */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-track{
    background:#0f172a;
}

::-webkit-scrollbar-thumb{
    background:#3b82f6;
    border-radius:20px;
}

</style>
</head>

<body>

<div class="moon"></div>

<!-- Floating Icons -->

<div class="floating" style="top:10%;left:8%;">💙</div>
<div class="floating" style="top:18%;left:82%;">🎸</div>
<div class="floating" style="top:30%;left:12%;">✨</div>
<div class="floating" style="top:20%;left:55%;">🌙</div>
<div class="floating" style="top:50%;left:88%;">🎵</div>
<div class="floating" style="top:65%;left:10%;">💫</div>

Click any button to reveal a reason ✨

<footer>
Made with admiration, stardust, music, and way too many confused feelings.
P.S : You are not even close to being a failure - you are the maximum success that a man can get to !

const message = document.getElementById("message");

button.onclick = () => {

/* Stars */

for(let i=0;i<170;i++){

</html>
