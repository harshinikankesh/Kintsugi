<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Why You Are Amazing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
overflow-x:hidden;
font-family:'Trebuchet MS',sans-serif;
background:
linear-gradient(to bottom,
#050816 0%,
#0b1026 35%,
#111c44 65%,
#1d2951 100%);
color:white;
position:relative;
}

/* Moon */

.moon{
position:absolute;
top:80px;
right:90px;
width:90px;
height:90px;
border-radius:50%;
background:#dbeafe;
opacity:0.55;
box-shadow:
0 0 20px rgba(255,255,255,0.15);
}

/* Stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

/* Floating icons */

.float{
position:absolute;
font-size:24px;
opacity:0.75;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

/* Main container */

.container{
position:relative;
z-index:2;
padding:70px 20px 120px;
text-align:center;
}

h1{
font-size:3rem;
line-height:1.3;
margin-bottom:20px;
color:#0f172a;
background:rgba(255,255,255,0.75);
display:inline-block;
padding:15px 35px;
border-radius:28px;
box-shadow:
0 0 25px rgba(255,255,255,0.12);
}

.subtitle{
margin-top:15px;
margin-bottom:50px;
font-size:1.2rem;
color:#dbeafe;
line-height:1.8;
}

/* Buttons */

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:22px;
max-width:1300px;
margin:auto;
}

.reason{
width:230px;
padding:22px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:0.35s;
font-size:1rem;
color:#dbeafe;
box-shadow:
0 0 20px rgba(255,255,255,0.04);
}

.reason:hover{
transform:translateY(-8px) scale(1.04);
background:rgba(96,165,250,0.15);
box-shadow:
0 0 30px rgba(96,165,250,0.25);
}

/* Popup */

.popup{
margin:60px auto;
max-width:920px;
padding:38px;
border-radius:35px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.18);
line-height:2;
font-size:1.1rem;
color:#f8fafc;
min-height:220px;
box-shadow:
0 0 30px rgba(255,255,255,0.06);
}

footer{
margin-top:50px;
color:#cbd5e1;
font-size:0.95rem;
}

</style>
</head>

<body>

<div class="moon"></div>

<!-- Floating icons -->

<div class="float" style="top:12%;left:8%;">🎸</div>
<div class="float" style="top:18%;left:18%;">💙</div>
<div class="float" style="top:16%;left:80%;">🎵</div>
<div class="float" style="top:34%;left:88%;">⚽</div>
<div class="float" style="top:52%;left:7%;">🏍️</div>
<div class="float" style="top:62%;left:90%;">✨</div>
<div class="float" style="top:42%;left:15%;">🎶</div>
<div class="float" style="top:25%;left:60%;">💫</div>

<div class="container">

<h1>
Why You Are A Successful<br>
And Amazing Human?
</h1>

<div class="subtitle">
The reasons why you make the world better with your existence &lt;3
</div>

<div class="buttons" id="buttons"></div>

<div class="popup" id="popup">
Click one of the reasons ✨
</div>

<footer>
Built with admiration, galaxies, music, football nights, and feelings.
</footer>

</div>

<script>

const reasons = [

{
title:"🎸 Why You're Different",
text:"You somehow manage to be intelligent, emotionally aware, calm, passionate, funny, and deeply caring all at once. That combination is unbelievably rare."
},

{
title:"⚽ Football Nights",
text:"Watching football with you would probably become one of those little memories that stays forever. The excitement, the chaos, the joy — it all feels warmer with you."
},

{
title:"🏍️ Ride With You",
text:"You feel like those late night rides under streetlights with music softly playing in the background — peaceful, exciting, and unforgettable."
},

{
title:"🎵 Your Music Taste",
text:"The fact that you love progressive metal already says so much about your mind. Complex, emotional, creative, layered — just like you."
},

{
title:"🎸 Misha Mansoor Energy",
text:"You have that same experimental, passionate energy. The kind of person who keeps improving because creating things matters deeply to you."
},

{
title:"☀️ Bottle Of Sunshine",
text:"You genuinely make spaces feel lighter. Even your presence changes the mood around people in the softest way."
},

{
title:"💙 Why I Admire You",
text:"The way your mind works is beautiful. The way you think deeply, care deeply, and still keep moving forward quietly is inspiring."
},

{
title:"✨ Reasons To Live",
text:"To hear new music. To ride under the night sky. To watch football. To build things. To laugh again. To exist in a world where someone somewhere is grateful you exist."
},

{
title:"🌙 Your Presence",
text:"There’s something calming about you. Even silence around you doesn’t feel empty — it feels safe."
},

{
title:"💫 Why You'll Succeed",
text:"Because you genuinely care about learning and becoming better. People with minds like yours eventually build extraordinary things."
},

{
title:"🎶 Your Soul",
text:"You feel like a song that slowly becomes someone’s favorite after they truly listen carefully."
},

{
title:"🌌 The Truth About You",
text:"You are deeply lovable in ways you probably don’t even realize. The future version of you is going to be proud that you kept going."
}

];

const buttonsDiv=document.getElementById("buttons");
const popup=document.getElementById("popup");

reasons.forEach(reason=>{

const button=document.createElement("div");

button.className="reason";

button.innerHTML=reason.title;

button.onclick=()=>{

popup.innerHTML=`
<h2 style="
margin-bottom:20px;
color:#93c5fd;
font-size:1.7rem;
">
${reason.title}
</h2>

${reason.text}
`;

};

buttonsDiv.appendChild(button);

});

/* Stars */

for(let i=0;i<220;i++){

let star=document.createElement("div");

star.classList.add("star");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDuration=(Math.random()*4+2)+"s";

document.body.appendChild(star);

}

</script>

</body>
</html>
