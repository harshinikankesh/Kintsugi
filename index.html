<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Why You're Amazing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    font-family: 'Trebuchet MS', sans-serif;
    color:white;
    background:
    linear-gradient(to bottom,
    #050816 0%,
    #0b1026 40%,
    #111827 70%,
    #1f2937 100%);
    position:relative;
}

/* Moon */

.moon{
    position:absolute;
    top:70px;
    right:90px;
    width:120px;
    height:120px;
    background:#fff8dc;
    border-radius:50%;
    box-shadow:
    0 0 40px #fff8dc,
    0 0 80px rgba(255,255,255,0.5);
}

/* Stars */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation: twinkle 3s infinite;
}

@keyframes twinkle{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

/* Floating aesthetic icons */

.floating{
    position:absolute;
    font-size:22px;
    opacity:0.7;
    animation: float 8s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0px);}
}

/* Content */

.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:60px 20px 150px;
}

h1{
    font-size:3rem;
    color:#ffe4ef;
    margin-bottom:15px;
    text-shadow:0 0 20px rgba(255,255,255,0.3);
}

.subtitle{
    font-size:1.2rem;
    color:#cbd5e1;
    margin-bottom:50px;
    line-height:1.8;
}

/* Buttons */

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    max-width:1200px;
    margin:auto;
}

.reason{
    padding:18px 24px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    cursor:pointer;
    transition:0.3s;
    width:250px;
    color:#fff;
    font-size:1rem;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
}

.reason:hover{
    transform:translateY(-6px) scale(1.03);
    background:rgba(255,182,193,0.18);
    box-shadow:0 0 30px rgba(255,182,193,0.3);
}

/* Message box */

.message{
    margin:60px auto;
    max-width:850px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    line-height:2;
    font-size:1.1rem;
    color:#ffeef5;
    min-height:180px;
}

/* Grass */

.grass{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:120px;
    background:linear-gradient(to top,#14532d,#166534);
    z-index:1;
}

/* Flowers */

.flower{
    position:absolute;
    bottom:70px;
    font-size:25px;
    animation: sway 4s infinite ease-in-out;
}

@keyframes sway{
    0%{transform:rotate(0deg);}
    50%{transform:rotate(4deg);}
    100%{transform:rotate(0deg);}
}

footer{
    margin-top:50px;
    color:#94a3b8;
    font-size:0.9rem;
}

</style>
</head>

<body>

<div class="moon"></div>

<!-- Floating aesthetic icons -->

<div class="floating" style="top:12%;left:10%;">💖</div>
<div class="floating" style="top:22%;left:80%;">🎵</div>
<div class="floating" style="top:35%;left:15%;">✨</div>
<div class="floating" style="top:18%;left:60%;">🌙</div>
<div class="floating" style="top:45%;left:85%;">💫</div>
<div class="floating" style="top:60%;left:8%;">🎶</div>

<div class="container">

<h1>Why You Are A Successful And Amazing Human?</h1>

<div class="subtitle">
The reasons why you make the world better with your existence &lt;3
</div>

<div class="buttons" id="buttons"></div>

<div class="message" id="message">
Click on one of the reasons ✨
</div>

<footer>
Made with admiration, stardust, and way too many feelings.
</footer>

</div>

<div class="grass"></div>

<div class="flower" style="left:5%;">🌸</div>
<div class="flower" style="left:15%;">🌼</div>
<div class="flower" style="left:25%;">🌷</div>
<div class="flower" style="left:40%;">🌸</div>
<div class="flower" style="left:55%;">🌻</div>
<div class="flower" style="left:70%;">🌷</div>
<div class="flower" style="left:85%;">🌼</div>

<script>

const reasons = [

{
title:"Why You'll Succeed",
text:"You succeed because you never stop learning. You don’t just dream about things — you study them, build them, break them, fix them, and understand them deeply. The way you think, your discipline, your curiosity, and your ability to keep going even when things are hard… that’s the kind of mindset successful people are made of."
},

{
title:"Why You're Different",
text:"You’re different because you care deeply while still being incredibly intelligent. Most people are either emotionally aware or technically skilled — but you somehow manage to be both."
},

{
title:"Why I Admire You",
text:"I admire the way your mind works. The passion you have for what you love, the effort you put into improving yourself, and the calm confidence you carry."
},

{
title:"Why You'll Build Big Things",
text:"Because you don’t think small. Your creativity mixed with technical skill is powerful — and one day the things you build are going to impact a lot of people."
},

{
title:"Why You're a Great Cybersecurity Engineer",
text:"You naturally notice patterns, risks, loopholes, and possibilities that most people miss."
},

{
title:"Why You Matter",
text:"You make people feel safe, understood, and valued. Your presence has this calm strength to it."
},

{
title:"Your Kindness",
text:"Your kindness is soft but powerful. The world genuinely becomes lighter around people like you."
},

{
title:"Your Intelligence",
text:"Your intelligence isn’t just about knowledge. It’s the way you observe things, solve problems, understand people, and keep learning constantly."
},

{
title:"Your Presence",
text:"There’s something calming about your presence. Even simple conversations with you feel meaningful."
},

{
title:"Everything About You",
text:"Your heart. Your mind. Your effort. Your dreams. Your kindness. Your strength. Every little piece of you adds up to someone unforgettable."
}

];

const buttonsDiv = document.getElementById("buttons");
const message = document.getElementById("message");

reasons.forEach(reason => {

const button = document.createElement("div");

button.className = "reason";

button.innerText = reason.title;

button.onclick = () => {
message.innerHTML = `
<h2 style="margin-bottom:20px;color:#ffd6e7;">
${reason.title}
</h2>
${reason.text}
`;
};

buttonsDiv.appendChild(button);

});

/* Stars */

for(let i=0;i<180;i++){

let star=document.createElement("div");

star.classList.add("star");

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDuration=(Math.random()*4+2)+"s";

document.body.appendChild(star);

}

</script>

</body>
</html>
